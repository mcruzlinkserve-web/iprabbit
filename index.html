<!DOCTYPE html>
<html>
<head>
    <title>My IP Checker</title>
    <style>
body {
  font-family: "Courier New";
  text-align: center;
  margin-top: 100px;
}

.container {
  border: 1px solid darkred;
  padding: 20px;
  display: inline-block;
}

h1 {
  font-size: 40px;
  color: darkred;
}

p {
  text-align: left;
  margin-left: auto;
  margin-right: auto;
  width: fit-content;
}

    </style>
</head>
<body>

<div class="container">
        <h2>Your IP Address:</h1>
        <h1 id="ip">Loading...</h2>
        <p id="info"></p>

    <image src="https://images.leadconnectorhq.com/image/f_webp/q_80/r_1200/u_https://assets.cdn.filesafe.space/QvdmKDKOqF54gPMj0J13/media/666b3c1981bb8ee3a783dfd6.jpeg">
</div>

<script>
    document.getElementById("ip").innerText = "Fetching...";
fetch("https://get.geojs.io/v1/ip/geo.json")
  .then(res => res.json())
  .then(data => {
    document.getElementById("ip").innerText = data.ip;
    document.getElementById("info").innerText =
      `Location: ${data.city}, ${data.region}, ${data.country}
          ISP: ${data.organization_name}
          Timezone: ${data.timezone}`;
  })
  .catch(() => {
    document.getElementById("ip").innerText = "Error";
      
  });
</script>

</body>
</html>
