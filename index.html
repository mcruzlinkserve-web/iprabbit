<!DOCTYPE html>
<html>
<head>
    <title>My IP Checker</title>
    <style>
        body {
            background: black;
            color: lime;
            font-family: "Courier New";
            text-align: center;
            margin-top: 100px;
        }

        .container {
            border: 1px solid lime;
            padding: 20px;
            display: inline-block;
        }

        h1 {
            font-size: 40px;

    </style>
</head>
<body>

<div class="container">
        <h2>Your IP Address:</h1>
        <h1 id="ip">Loading...</h2>
        <p id="info" text-align: left;></p>
</div>

<script>
    document.getElementById("ip").innerText = "Fetching...";
fetch("https://ipapi.co/json/")
  .then(res => res.json())
  .then(data => {
    document.getElementById("ip").innerText = data.ip;
    document.getElementById("info").innerText =
      `Location: ${data.city}, ${data.region}, ${data.country_name}
          ISP: ${data.org}
          Timezone: ${data.timezone}`;
  })
  .catch(() => {
    document.getElementById("ip").innerText = "Error";
      
  });
</script>

</body>
</html>
